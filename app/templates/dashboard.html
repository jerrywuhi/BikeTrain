{% extends "base.html" %}

{% block content %}

<h1>歡迎 {{ user.username }}</h1>

<div class="card p-3 mt-3">

    <h4>個人資料</h4>

    <p>FTP：{{ user.ftp }}</p>

    <p>體重：{{ user.weight }}</p>

</div>

<div class="card p-3 mt-3">

    <h4>訓練統計</h4>

    <p>總騎乘次數：{{ total_rides }}</p>

    <p>總距離：{{ total_distance }} km</p>

    <p>總時間：{{ total_duration }} hr</p>

</div>

<a href="/ride/add"
   class="btn btn-primary mt-3">
   新增騎乘紀錄
</a>

<a href="/rides"
   class="btn btn-success mt-3">
   查看騎乘紀錄
</a>

{% endblock %}
