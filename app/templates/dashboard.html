{% extends "base.html" %}

{% block content %}

<h1>歡迎 {{ user.username }}</h1>

<div class="card p-3 mt-3">

    <h4>個人資料</h4>

    <p>FTP：{{ user.ftp }}</p>

    <p>體重：{{ user.weight }}</p>

</div>

<div class="card p-3 mt-3">

    <h4>訓練統計</h4>

    <p>總騎乘次數：{{ total_rides }}</p>

    <p>總距離：{{ total_distance }} km</p>

    <p>總時間：{{ total_duration }} hr</p>

</div>

<a href="/ride/add" class="btn btn-primary mt-3">
    新增騎乘紀錄
</a>

<a href="/rides" class="btn btn-success mt-3">
    查看騎乘紀錄
</a>

<hr class="mt-4">

<h2>騎乘距離趨勢</h2>

<canvas id="distanceChart"></canvas>

<script>

const rideDates = {{ ride_dates | tojson }};
const rideDistances = {{ ride_distances | tojson }};

const ctx = document.getElementById('distanceChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: rideDates,
        datasets: [{
            label: '距離 (km)',
            data: rideDistances
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: true
            }
        },
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>

{% endblock %}
