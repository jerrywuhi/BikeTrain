<!DOCTYPE html>
<html>

<head>
    <title>BikeTrain 註冊</title>
</head>

<body>

    <h1>🚴 BikeTrain 註冊</h1>

    <form method="POST">

        {{ form.hidden_tag() }}

        <p>
            {{ form.username.label }}
            <br>
            {{ form.username() }}
        </p>

        <p>
            {{ form.email.label }}
            <br>
            {{ form.email() }}
        </p>

        <p>
            {{ form.password.label }}
            <br>
            {{ form.password() }}
        </p>

        <p>
            {{ form.confirm_password.label }}
            <br>
            {{ form.confirm_password() }}
        </p>

        <p>
            {{ form.submit() }}
        </p>

    </form>

</body>

</html>
